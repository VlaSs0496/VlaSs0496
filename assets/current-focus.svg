  <style>
    .frame {
      opacity: 0;
      animation: focusCycle 20s linear infinite;
    }
    .label {
      font-family: "Fira Code", monospace;
      font-size: 30px;
      font-weight: 600;
      dominant-baseline: middle;
    }
    .f1 { opacity: 1; animation-delay: 0s; }
    .f2 { animation-delay: 4s; }
    .f3 { animation-delay: 8s; }
    .f4 { animation-delay: 12s; }
    .f5 { animation-delay: 16s; }
    @keyframes focusCycle {
      0% { opacity: 0; }
      8% { opacity: 1; }
      18% { opacity: 1; }
      22% { opacity: 0; }
      100% { opacity: 0; }
    }
  </style>

  <g class="frame f1">
    <use href="#icon-android" x="120" y="36" width="28" height="28" />
